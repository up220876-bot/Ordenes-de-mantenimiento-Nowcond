<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administrar Áreas</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="form-page">

    <h1>Administrar Áreas</h1>

    <div class="orden-form">

        <form method="POST">

            <div class="campo">
                <label>Nueva área</label>

                <input type="text"
                       name="nombre"
                       required>
            </div>

            <button type="submit" class="guardar-btn">
                Agregar área
            </button>

        </form>

        <table class="admin-table">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Área</th>
                    <th>Guardar</th>
                    <th>Eliminar</th>
                </tr>
            </thead>

            <tbody>

                {% for area in areas %}

                <tr>

                    <td>{{ area.id }}</td>

                    <td>

                        <form method="POST"
                              action="/editar_area/{{ area.id }}">

                            <input type="text"
                                   name="nombre"
                                   value="{{ area.nombre }}"
                                   required>

                    </td>

                    <td>

                            <button type="submit"
                                    class="guardar-btn">
                                Guardar
                            </button>

                        </form>

                    </td>

                    <td>

                        <a href="/eliminar_area/{{ area.id }}"
                           class="eliminar-btn">

                           Eliminar

                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

        <a href="/administrar_formatos"
           class="regresar">

           Regresar

        </a>

    </div>

</div>

</body>
</html>
